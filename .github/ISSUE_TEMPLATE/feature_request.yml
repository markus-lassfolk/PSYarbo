name: Feature Request
description: Suggest a new feature or enhancement for PSYarbo.
title: "[Feature]: "
labels: ["enhancement"]
assignees:
  - markus-lassfolk

body:
  - type: markdown
    attributes:
      value: |
        Got an idea to make PSYarbo better? Great — describe it below!

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: Is your feature request related to a problem? Describe it.
      placeholder: "I find it frustrating when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: A clear description of what you want to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you considered any alternative solutions or workarounds?

  - type: textarea
    id: api-sketch
    attributes:
      label: API / cmdlet sketch (optional)
      description: |
        If you have an idea of what the cmdlet or function signature would look like, sketch it here.
      render: powershell
      placeholder: |
        # Example:
        Connect-Yarbo -MowerSerial 'YB-XXXX' -MqttServer '192.168.1.100'
        Get-YarboStatus | Format-List

  - type: checkboxes
    id: willing-to-pr
    attributes:
      label: Would you like to implement this?
      options:
        - label: Yes, I'd like to submit a PR for this feature.

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context, screenshots, or links that might help.
