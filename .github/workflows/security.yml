name: Security

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday at 06:00 UTC
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  secret-scan:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for gitleaks

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}  # only needed for org/enterprise

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    # Only on PRs — dependency-review action requires a PR context
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  pssa-security-rules:
    name: PSScriptAnalyzer Security Rules
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module -Name PSScriptAnalyzer -MinimumVersion 1.21.0 -Scope CurrentUser -Force

      - name: Run security-focused PSSA rules
        shell: pwsh
        run: |
          $securityRules = @(
            'PSAvoidUsingPlainTextForPassword',
            'PSAvoidUsingConvertToSecureStringWithPlainText',
            'PSAvoidUsingUsernameAndPasswordParams',
            'PSAvoidUsingInvokeExpression',
            'PSAvoidUsingWMICmdlet'
          )
          $findings = Get-ChildItem -Path './src' -Include '*.ps1','*.psm1','*.psd1' -Recurse |
            ForEach-Object {
              Invoke-ScriptAnalyzer -Path $_.FullName -IncludeRule $securityRules -Severity Error,Warning
            }
          if ($findings) {
            Write-Host "## Security findings:" -ForegroundColor Red
            $findings | Format-Table -AutoSize
            exit 1
          }
          Write-Host "Security scan: PASSED (0 findings)" -ForegroundColor Green
