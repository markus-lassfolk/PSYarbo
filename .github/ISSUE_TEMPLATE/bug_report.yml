name: Bug Report
description: Report a bug or unexpected behaviour in PSYarbo.
title: "[Bug]: "
labels: ["bug", "triage"]
assignees:
  - markus-lassfolk

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: Tell us what happened...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behaviour.
      placeholder: |
        1. Import the module with `Import-Module PSYarbo`
        2. Run `...`
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened? Include full error messages.
    validations:
      required: true

  - type: input
    id: module-version
    attributes:
      label: PSYarbo version
      placeholder: "e.g. 0.1.0"
    validations:
      required: true

  - type: input
    id: ps-version
    attributes:
      label: PowerShell version
      description: Output of `$PSVersionTable.PSVersion`
      placeholder: "e.g. 7.4.1"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows 11
        - Windows 10
        - Ubuntu 24.04
        - Ubuntu 22.04
        - macOS 14 (Sonoma)
        - macOS 13 (Ventura)
        - Other (specify in additional context)
    validations:
      required: true

  - type: input
    id: yarbo-model
    attributes:
      label: Yarbo model
      placeholder: "e.g. Yarbo S1"

  - type: input
    id: mqtt-broker
    attributes:
      label: MQTT broker
      placeholder: "e.g. Mosquitto 2.0.18, Home Assistant Mosquitto add-on"

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other information that might help (logs, screenshots, config snippets — redact any credentials).
